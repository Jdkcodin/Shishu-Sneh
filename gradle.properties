# gradle.properties — Global Gradle Settings
#
# These settings apply to ALL Gradle builds in this project.

# How much memory Gradle is allowed to use.
# 2048m (2 GB) is recommended for Android builds.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use AndroidX libraries instead of old Support Libraries.
# AndroidX is the modern replacement — always keep this true.
android.useAndroidX=true

# Kotlin code style — 'official' follows JetBrains' coding conventions.
kotlin.code.style=official

# Non-transitive R classes — each module only sees its own resources.
# This speeds up builds and avoids resource name conflicts.
android.nonTransitiveRClass=true
